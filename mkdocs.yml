site_name: Meridian — DevOps Gate
site_url: https://oss.kurvenschule.cloud
site_description: A hard-blocking change gate for AI-generated and human code. Self-hosted, Apache-2.0, air-gap capable. Free alternative to Semgrep, GHAS and SonarQube.
site_author: weilmaschinchen
repo_url: https://github.com/weilmaschinchen/meridian
repo_name: weilmaschinchen/meridian
edit_uri: edit/main/docs/
copyright: Apache-2.0 — weilmaschinchen

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - toc.follow
  icon:
    repo: fontawesome/brands/github

hooks:
  - hooks.py

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/weilmaschinchen/meridian
      name: Meridian on GitHub

extra_css:
  - assets/extra.css

extra_javascript:
  - assets/extra.js

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - Start Here:
    - What Is a Change Gate?: start-here/what-is-a-gate.md
    - What Is an RFC?: start-here/what-is-a-rfc.md
    - Where Meridian Fits: start-here/how-meridian-fits.md
  - Getting Started:
    - Docker Compose Setup: getting-started/docker-compose.md
    - Submit Your First Analysis: getting-started/first-analysis.md
    - Health Check: getting-started/health-check.md
  - Configuration:
    - Environment Variables: configuration/env-reference.md
    - Rules Schema: configuration/rules-schema.md
  - Integrations:
    - Forgejo: integrations/forgejo.md
    - GitHub: integrations/github.md
  - External Patterns:
    - Overview: external-patterns/overview.md
    - Custom Risk Rules: external-patterns/custom-risk-rules.md
    - Custom AST Rules: external-patterns/custom-ast-rules.md
    - Plugin Authoring: external-patterns/plugin-authoring.md
    - Gaps & Roadmap: external-patterns/gaps-and-roadmap.md
  - How-To:
    - Gate AI-Generated Code: how-to/ai-generated-code.md
    - Understand BLOCKED & Override: how-to/block-and-override.md
    - Control LLM Costs: how-to/llm-cost-control.md
  - Scenarios:
    - Solo Dev + AI Tools: scenarios/solo-dev.md
    - Small Team: scenarios/small-team.md
    - Regulated Domain: scenarios/regulated.md
  - Reference:
    - API Endpoints: reference/api-endpoints.md
    - AST Rules Catalog: reference/ast-rules-catalog.md
  - Resources:
    - Meridian vs Alternatives: resources/comparisons.md
    - Further Reading: resources/further-reading.md
